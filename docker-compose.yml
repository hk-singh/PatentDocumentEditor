services:
  server:
    container_name: EngineeringChallenge_Server
    build: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/usr/src/app
    env_file:
      - ./server/.env

  client:
    container_name: EngineeringChallenge_Client
    build: ./client
    environment:
      - VITE_API_PROXY_TARGET=http://server:8000
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
